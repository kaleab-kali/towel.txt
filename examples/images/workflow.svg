<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Markdown to document workflow</title>
  <desc id="desc">A four step workflow from Markdown source to printable output.</desc>
  <rect width="720" height="280" fill="#f8fafc" rx="16" />
  <g fill="#ffffff" stroke="#0f766e" stroke-width="3">
    <rect x="40" y="42" width="132" height="112" rx="12" />
    <rect x="216" y="42" width="132" height="112" rx="12" />
    <rect x="392" y="42" width="132" height="112" rx="12" />
    <rect x="556" y="42" width="132" height="112" rx="12" />
  </g>
  <g fill="#0f172a" font-family="Arial, sans-serif" font-size="20" font-weight="700">
    <text x="58" y="76">Markdown</text>
    <text x="235" y="76">Render</text>
    <text x="404" y="76">Assets</text>
    <text x="566" y="76">Output</text>
  </g>
  <g fill="#334155" font-family="Arial, sans-serif" font-size="14">
    <text x="58" y="118">Write source</text>
    <text x="235" y="118">Build HTML</text>
    <text x="404" y="118">Copy local files</text>
    <text x="566" y="118">Print or share</text>
  </g>
  <g stroke="#475569" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
    <path d="M182 98h24" />
    <path d="m198 88 10 10-10 10" />
    <path d="M358 98h24" />
    <path d="m374 88 10 10-10 10" />
    <path d="M534 98h12" />
    <path d="m538 88 10 10-10 10" />
  </g>
  <g fill="none" stroke="#99f6e4" stroke-width="10">
    <circle cx="86" cy="209" r="28" />
    <circle cx="264" cy="209" r="28" />
    <circle cx="440" cy="209" r="28" />
    <circle cx="602" cy="209" r="28" />
  </g>
  <g fill="#0f766e" font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <text x="80" y="215">1</text>
    <text x="258" y="215">2</text>
    <text x="434" y="215">3</text>
    <text x="596" y="215">4</text>
  </g>
</svg>
